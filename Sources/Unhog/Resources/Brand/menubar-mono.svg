<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" role="img" aria-label="Unhog menu-bar template icon: the Relief mark — a tall bar beside two stacked tiles forming an open square.">
  <!--
    Unhog menu-bar icon - 16px monochrome template.

    The "Relief" mark reduced to a single-colour silhouette: a tall left
    bar (RAM) beside a stacked pair of tiles (CPU over energy), separated
    by 2px gutters on the pixel grid. macOS tints the whole glyph for
    light/dark/active menu-bar states.

    Export as template ("UnhogMenuTemplate"): single color, alpha only.
  -->
  <g fill="#000000">
    <rect x="1" y="1" width="6" height="14" rx="1.6"/>
    <rect x="9" y="1" width="6" height="6" rx="1.6"/>
    <rect x="9" y="9" width="6" height="6" rx="1.6"/>
  </g>
</svg>
