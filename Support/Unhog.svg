<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Unhog app icon: soft light macOS plate with the Relief mark — a violet RAM bar, a cyan CPU tile, and an orange energy tile forming an open square.">
  <!--
    Unhog app icon - 1024pt master.
    Plate: Apple macOS icon grid - 824x824 rounded rect (r 185.4)
    centered in the 1024 canvas, soft light with a quiet top highlight.
    Mark: "Relief" - three resource tiles (violet RAM, cyan CPU, orange
    energy) arranged as an open square, optically centered on (512,512).
  -->
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDEFF3"/>
    </linearGradient>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185.4" fill="url(#plate)"/>
  <!-- hairline edge to seat the plate on any wallpaper -->
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.9" fill="none" stroke="#000000" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Relief mark, ink-centered on (512,512): scale 7.8 from the 100 master -->
  <g transform="translate(122 122) scale(7.8)">
    <path fill="#9758FF" d="M18 30C18 23.4 23.4 18 30 18H48V82H30C23.4 82 18 76.6 18 70V30Z"/>
    <path fill="#4ACFFF" d="M56 18H70C76.6 18 82 23.4 82 30V48H66C60.5 48 56 43.5 56 38V18Z"/>
    <path fill="#FF8D22" d="M56 58H82V70C82 76.6 76.6 82 70 82H56V58Z"/>
  </g>
</svg>
